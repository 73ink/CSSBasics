<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 5 - Flexbox Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Flexbox Layout Practice</h1>

    <h2>Row Direction</h2>
    <div class="flex-container row-layout">
      <div>Home</div>
      <div>Services</div>
      <div>Projects</div>
      <div>Contact</div>
    </div>

    <h2>Column Direction</h2>
    <div class="flex-container column-layout">
      <div>Dashboard</div>
      <div>Reports</div>
      <div>Settings</div>
      <div>Logout</div>
    </div>
  </main>
</body>
</html>
